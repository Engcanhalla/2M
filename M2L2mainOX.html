<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#2e1065 0%,#4c1d95 60%,#1e1b4b 100%);min-height:100vh;min-height:-webkit-fill-available;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(80px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;touch-action:pan-y}
.wrap{max-width:520px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}

.title-box .tlabel{display:inline-block;margin-top:6px;font-size:.72rem;background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:20px;font-weight:700}
.statement{margin:14px 0;padding:16px 18px;background:#fff;border:1.5px solid #e8ecf1;border-radius:14px;font-size:1rem;color:#1e293b;line-height:1.65;font-weight:500;box-shadow:0 1px 4px rgba(15,23,42,.06)}

.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}

.ox-btn.x{color:#dc2626}

.ox-btn.sel.o{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981}
.ox-btn.sel.x{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444}
.ox-btn.sel.dunno{background:#f1f5f9;border-color:#94a3b8}
.ox-btn.correct{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981;color:#065f46}
.ox-btn.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444;color:#7f1d1d}
.ox-btn[disabled]{cursor:default;opacity:.85}
.ox-icon{display:block;font-size:1.6rem;margin-bottom:4px}
.fb{text-align:center;padding:14px 16px;border-radius:14px;margin-top:14px;font-weight:700;font-size:.92rem;line-height:1.5}
.fb.ok{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7}

.fb.dunno{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.explain-box{margin-top:10px;padding:14px;background:#fff;border-radius:12px;border:1.5px solid #e8ecf1}
.ex-title{font-size:.82rem;font-weight:800;color:#6d28d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #f1f5f9}
.ex-body{font-size:.88rem;color:#374151;line-height:1.75}

.nav-btn.prev,.nav-btn.home{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.set-list{display:grid;gap:10px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.set-card:hover{border-color:#8b5cf6;background:#faf5ff;transform:translateY(-2px)}
.set-card.done{border-color:#8b5cf6;background:linear-gradient(135deg,#faf5ff,#f3e8ff)}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}

var CONFIG={"title":"M2L2mainOX","passThreshold":100,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Bobby and Bob","body":"Bobby got his name from his grandfather, Bob. Bob was his best friend. Bob was the person who taught Bobby how to walk. \"Hold my hands, Bobby,\" Bob said. \"Now one foot, now the other.\" Bob and Bobby often played with old wooden blocks. They slowly piled the blocks one by one to build a tower. \"There is one more block to put,\" Bob said. \"And that's the elephant block,\" Bobby said. Bobby carefully put the elephant block on the top. But Bob sneezed, and the tower fell. Bobby laughed and laughed. Bobby said, \"You always sneeze when the elephant block appears.\" "},{"id":2,"title":"Bobby and Bob","body":"Time passed. One day, Bobby's dad looked very sad. He told Bobby, \"Bob fell ill. He is in a hospital which is far from here.\" \"I want to see him,\" Bobby said. \"You can't, Bobby,\" Mom told him. \"He can't move his arms and legs, and he can't talk. We'll just have to wait and hope that he will get better.\" Bob came back home after a few months. He just lay in bed without talking or moving. After a while, Bobby came into Bob's room with the blocks. \"Bob, it's time to build a tower!\" Bob's mouth made a small smile. Bobby began to build the tower. \"Okay, Bob, now the elephant block.\" "},{"id":3,"title":"Bob's Recovery","body":"Suddenly, Bob made a small sound like sneezing. At that moment, Bobby realized that Bob would recover soon. And Bob did. Slowly, Bob began to talk a little and move his fingers. But he still couldn't walk. When the weather got nice and warm, Bob and Bobby sat side by side. The summer breeze with the smell of happiness was blowing. \"You taught me how to walk. Do you remember?\" Bobby said. Then, Bob stood up very slowly. Bobby smiled and stood in front of Bob. Bob leaned on Bobby's shoulders. Bobby said, \"When I was little, you held my hands and said these words.\" And Bobby added, \"Now one foot.\" Like magic, Bob moved one foot. \"Now the other.\" And Bob moved the other."}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 할아버지의 이름을 따서 이름이 지어졌다.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null,"explanation":"지문에서는 'Bobby got his name from his grandfather, Bob'이라고 하여, Bobby가 할아버지 Bob의 이름을 따서 이름이 지어졌다고 나와 있습니다. 그런데 statement는 'Bob이 할아버지의 이름을 따서 이름이 지어졌다'고 하여 주체가 반대로 뒤바뀌어 있습니다. 따라서 지문 내용과 일치하지 않습니다."},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 Bobby에게 걷는 법을 가르쳐 준 사람이었다.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 Bobby에게 달리는 법을 가르쳐 주었다.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":4,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob과 Bobby는 새로운 나무 블럭을 가지고 자주 놀았다.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null,"explanation":"지문에서 Bob과 Bobby는 '오래된 나무 블럭(old wooden blocks)'을 가지고 자주 놀았다고 나와 있다. Statement에서는 '새로운 나무 블럭'이라고 했으므로, 'old(오래된)'를 'new(새로운)'로 왜곡한 것이다. 따라서 지문 내용과 일치하지 않는다."},{"questionNumber":5,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby가 코끼리 블록을 탑의 맨 위에 조심스럽게 올려놓았다.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":6,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby가 재채기를 해서 탑이 무너졌다.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":7,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby는 탑이 무너지자 울음을 터뜨렸다.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":8,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby's name came from his father, Bob.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":9,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bob and Bobby stacked the blocks two at a time to build a tower.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":10,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby said that Bob always sneezes when the elephant block shows up.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":11,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The last block placed on the tower was the elephant block.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":12,"type":"grammar","typeLabel":"문법","statement":"Bob was the person who taught Bobby where to walk.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null,"explanation":"지문에서는 'Bob was the person who taught Bobby how to walk'라고 되어 있어, Bob이 Bobby에게 '걷는 방법(how to walk)'을 가르쳤다고 명시되어 있습니다. 그러나 statement는 'where to walk(어디서 걷는지)'라고 표현하여 핵심 단어를 'how'에서 'where'로 바꿨습니다. 이는 지문의 내용과 다르므로 X입니다."},{"questionNumber":13,"type":"grammar","typeLabel":"문법","statement":"Bobby carefully put the elephant block on the top.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":14,"type":"grammar","typeLabel":"문법","statement":"They slowly piled the blocks one by one to building a tower.","answer":"X","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null,"explanation":"지문에는 'They slowly piled the blocks one by one to build a tower.'라고 나와 있습니다. Statement에서는 'to building'이라고 표현했지만, 지문의 원문은 'to build'로 to부정사 형태를 사용하고 있습니다. 따라서 문법적으로 틀린 표현이 포함되어 있어 지문과 일치하지 않습니다."},{"questionNumber":15,"type":"order","typeLabel":"순서 판단","statement":"Bob sneezed and the tower fell. → Bobby laughed and laughed.","answer":"O","passageId":1,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":16,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby의 아빠는 Bob이 아프다는 소식을 전할 때 매우 슬픈 표정을 하고 있었다.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":17,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob이 입원한 병원은 Bobby의 집 근처에 있었다.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":18,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby에게 병원에 갈 수 없다고 말한 사람은 Bobby의 엄마였다.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":19,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 병원에서 팔과 다리를 움직일 수 없었고, 말도 할 수 없었다.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":20,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 몇 주 후에 집으로 돌아왔다.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":21,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"집에 돌아온 Bob은 침대에 누워서 말도 하지 않고 움직이지도 않았다.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby가 Bob의 방에 가져온 것은 장난감 자동차였다.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby가 탑을 쌓기 시작했을 때, Bob은 작은 미소를 지었다.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":24,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby's mom told him that Bob was in a hospital far away.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":25,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby was the one who first suggested building a tower to Bob.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":26,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bob smiled broadly when Bobby mentioned the elephant block.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":27,"type":"grammar","typeLabel":"문법","statement":"He told Bobby that Bob fell ill and was in a hospital which is far from here.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":28,"type":"grammar","typeLabel":"문법","statement":"Bob came back home after a few months and just lied in bed without talking or move.","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null,"explanation":"이 statement는 지문에 전혀 등장하지 않는 내용입니다. 지문은 Bobby와 할아버지 Bob이 함께 블록 쌓기를 하며 노는 장면만 묘사할 뿐, Bob이 집에 돌아왔다거나 침대에 누웠다는 내용은 없습니다. 또한 문제 유형이 'grammar'인 점을 고려하면, 'without talking or move'에서 병렬 구조 오류(move → moving)도 존재합니다."},{"questionNumber":29,"type":"grammar","typeLabel":"문법","statement":"Bobby came into Bob's room with the blocks and said, \"Bob, it's time building a tower!\"","answer":"X","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":30,"type":"order","typeLabel":"순서","statement":"Bob returned home after a few months. → Bobby entered Bob's room carrying the blocks.","answer":"O","passageId":2,"passageTitle":"Bobby and Bob","sourceSentence":null},{"questionNumber":31,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob이 재채기와 비슷한 작은 소리를 냈을 때, Bobby는 Bob이 곧 회복할 것이라고 느꼈다.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":32,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 회복되면서 처음에 발가락을 조금씩 움직이기 시작했다.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":33,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"날씨가 따뜻해졌을 때, Bob과 Bobby는 나란히 앉아 있었다.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":34,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 회복 후 바로 걷는 것도 가능해졌다.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":35,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby가 어렸을 때 Bob이 Bobby의 손을 잡고 걷는 법을 알려준 것은 Bobby가 먼저 떠올렸다.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":36,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bobby는 Bob의 앞에 서서 Bob이 일어서도록 도왔다.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":37,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Bob은 Bobby의 손을 잡으며 첫 발을 내딛었다.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":38,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby realized Bob would get better after hearing Bob make a small noise like sneezing.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":39,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bob leaned on Bobby's hands as he tried to take his first step.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":40,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bobby repeated the same words to Bob that Bob had once said to Bobby as a child.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":41,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Bob stood up quickly and walked without any help after Bobby encouraged him.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":42,"type":"grammar","typeLabel":"문법","statement":"Slowly, Bob began to talk a little and move his fingers.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null,"explanation":"해당 문장은 지문에 'Slowly, Bob began to talk a little and move his fingers.'라고 정확히 동일하게 등장합니다. 내용, 어순, 단어 모두 지문과 완전히 일치하므로 O입니다."},{"questionNumber":43,"type":"grammar","typeLabel":"문법","statement":"Bobby smiled and stand in front of Bob.","answer":"X","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null,"explanation":"지문에는 'Bobby smiled and stood in front of Bob.'이라고 과거형 'stood'가 사용되어 있습니다. 그러나 statement에서는 'stand'라는 동사 원형을 사용하고 있어 문법적으로 일치하지 않습니다. 따라서 동사 시제(형태)가 다르므로 X로 판정합니다."},{"questionNumber":44,"type":"grammar","typeLabel":"문법","statement":"Bob leaned on Bobby's shoulders and moved one foot after another.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null},{"questionNumber":45,"type":"order","typeLabel":"순서 판단","statement":"Bob이 손가락을 움직이기 시작했다 → Bob과 Bobby가 나란히 앉아 여름 바람을 느꼈다.","answer":"O","passageId":3,"passageTitle":"Bob's Recovery","sourceSentence":null}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>

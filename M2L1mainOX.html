var CONFIG={"title":"M2L1mainOX","passThreshold":100,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Sleep Habits Guide","body":"Welcome back to school. How do you feel today? Did you sleep well last night? Sleeping well can give you energy for the new school year. Now, check your sleep habits with the list. I ... go to bed at different times, drink a lot of energy drinks, use my smartphone before sleeping, sleep less than 8 hours a day, eat before bedtime, take long naps. How many habits did you check? These habits may cause sleep problems. Do you think you need a change? Let's find out what to do. Have a regular sleep pattern. Your body has a \"clock.\" The body clock tells you when to wake up and sleep. For example, in the morning, your body starts to feel lively. At night, your body starts to feel sleepy. Listen to your body clock and sleep regularly. You will feel healthier. "},{"id":2,"title":"Sleep Hygiene Tips","body":"Be careful about caffeine. Caffeine can cause sleep problems. Do you know that even chocolate has caffeine? Caffeine hides in many foods and drinks such as chocolate, coffee, tea, soda, and energy drinks. So, be careful! Move your body actively. Exercise during the day. Then, your body will feel a little tired, and you will fall asleep easily at night. Remember to finish exercising a few hours before bedtime. If you finish it right before bedtime, your body may feel too awake. You may not fall asleep easily. Stop using your smartphone before bedtime. If you use your smartphone late at night, your brain will stay active. The blue light from the phone will also tell your brain, \"Hey, don't sleep yet.\" To sleep well, don't use your phone right before bedtime."}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"잠을 잘 자면 새 학년을 위한 에너지를 절약할 수 있다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문에서는 'Sleeping well can give you energy for the new school year(잠을 잘 자면 새 학년을 위한 에너지를 줄 수 있다)'라고 설명한다. statement는 '에너지를 절약할 수 있다'고 했지만, 지문의 표현은 '에너지를 준다(give energy)'이므로 의미가 다르다. '절약'과 '공급(제공)'은 서로 다른 개념이므로 X이다."},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"체크리스트에 따르면, 잠자리에 들기 전에 스마트폰을 사용하는 것은 수면에 나쁘지 않은 습관이다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문의 체크리스트에는 '잠자리에 들기 전에 스마트폰을 사용하는 것(use my smartphone before sleeping)'이 수면 문제를 유발할 수 있는 나쁜 습관 중 하나로 명시되어 있습니다. 따라서 '수면에 나쁘지 않은 습관'이라는 서술은 지문 내용과 정반대입니다."},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"하루에 8시간 이상 자는 것이 수면 문제를 일으킬 수 있는 습관 중 하나로 나열되어 있다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":4,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"신체 시계는 언제 일어나고 잠들어야 하는지 알려준다.","answer":"O","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":5,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"아침에 우리 몸은 잠이 덜 깨어 피곤할 수 있다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문에서는 '아침에 몸이 활기차게 느껴지기 시작한다(in the morning, your body starts to feel lively)'고 명시되어 있습니다. 따라서 아침에 몸이 피곤하거나 잠이 덜 깨어 있다는 statement의 내용은 지문과 정반대입니다."},{"questionNumber":6,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"에너지 음료를 많이 마시는 것은 낮잠을 오래 자는 것과 비슷한 효과를 가진다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문에서 에너지 음료를 많이 마시는 것과 낮잠을 오래 자는 것은 모두 나쁜 수면 습관의 사례로 나열되어 있을 뿐, 두 습관이 서로 비슷한 효과를 가진다는 내용은 전혀 언급되지 않습니다. 지문은 단순히 이러한 습관들이 수면 문제를 유발할 수 있다고 말할 뿐, 각 습관 간의 효과를 비교하거나 연결 짓지 않습니다."},{"questionNumber":7,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"규칙적으로 잠을 자면 더 피곤하게 느낄 수 있다.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":8,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Going to bed at different times is listed as a habit that may cause sleep problems.","answer":"O","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":9,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage says that eating after bedtime is one of the habits to avoid.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":10,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"At night, your body begins to feel lively according to the body clock.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":11,"type":"grammar","typeLabel":"문법","statement":"Listen to your body clock and sleep regular.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":12,"type":"grammar","typeLabel":"문법","statement":"Sleep well can give you energy for the new school year.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문에서는 'Sleeping well can give you energy for the new school year.'라고 동명사 형태(Sleeping)를 사용하였다. 그러나 주어진 statement는 'Sleep well can give you energy'로, 동사 원형 'Sleep'을 주어로 사용하여 문법적으로 올바르지 않은 형태이다. 따라서 지문의 표현과 정확히 일치하지 않으므로 X이다."},{"questionNumber":13,"type":"grammar","typeLabel":"문법","statement":"Your body has a clock that tell you how to wake up and sleep.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null,"explanation":"지문에서는 'The body clock tells you when to wake up and sleep'라고 하여 몸의 시계가 '언제(when)' 일어나고 자야 하는지를 알려준다고 했습니다. 그러나 statement에서는 'how to wake up and sleep'으로 '어떻게(how)'라고 표현하여 지문과 다릅니다. 또한 지문의 'tells'를 'tell'로 쓴 것도 문법적으로 잘못된 표현입니다."},{"questionNumber":14,"type":"insertion","typeLabel":"문장 삽입","statement":"These habits may cause sleep problems. → Do you think you need a change?","anchorSentence":"These habits may cause sleep problems.","targetSentence":"Do you think you need a change?","claimedPosition":"after","answer":"O","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":15,"type":"order","typeLabel":"문장 순서","statement":"At night, your body starts to feel sleepy. → In the morning, your body starts to feel lively.","answer":"X","passageId":1,"passageTitle":"Sleep Habits Guide","sourceSentence":null},{"questionNumber":16,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"카페인은 수면 문제를 일으킬 수 있다.","answer":"O","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":17,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"초콜릿에는 카페인이 들어 있지 않다.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":18,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"카페인은 커피, 차, 탄산음료, 주스 같은 음료수에 숨어 있다.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"지문에서는 카페인이 숨어 있는 음료로 커피(coffee), 차(tea), 탄산음료(soda), 에너지 드링크(energy drinks)를 언급하고 있습니다. Statement에는 '주스'가 포함되어 있지만, 지문에는 주스에 대한 언급이 없으며 대신 에너지 드링크가 포함되어 있습니다. 따라서 지문과 정확히 일치하지 않으므로 X입니다."},{"questionNumber":19,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"낮에 운동을 하면 몸이 너무 깨어 있어서 잠들기 어렵다.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":20,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"잠자리에 들기 바로 직전에 운동을 끝내면 몸이 너무 깨어 있을 수 있다.","answer":"O","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":21,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"스마트폰을 늦은 밤에 사용하면 뇌의 활동이 줄어든다.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"지문에서는 스마트폰을 늦은 밤에 사용하면 뇌가 활발하게 활동을 유지한다(your brain will stay active)고 설명합니다. 즉, 뇌 활동이 '줄어든다'는 진술은 지문의 내용과 정반대입니다."},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"스마트폰의 파란빛은 뇌에 잠자지 말라는 신호를 보낸다.","answer":"O","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":23,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Caffeine is found in foods and drinks like chocolate, coffee, and energy drinks.","answer":"O","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":24,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Exercising right before bedtime helps your body fall asleep more easily.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":25,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The blue light from a smartphone tells your brain not to go bad.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"지문에서는 스마트폰의 블루라이트가 뇌에 '아직 자지 마(don't sleep yet)'라고 신호를 보낸다고 설명합니다. 그러나 statement에서는 'not to go bad(나빠지지 말라고)'라고 표현되어 있어, 지문의 내용과 전혀 다릅니다. 핵심 의미가 왜곡되었으므로 X입니다."},{"questionNumber":26,"type":"grammar","typeLabel":"문법","statement":"If you finish exercising right before bedtime, your body may feel too wake.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"지문에는 'your body may feel too awake'라고 표현되어 있습니다. 그런데 statement에서는 'too wake'라고 잘못 쓰여 있습니다. 'awake'는 형용사로 올바른 표현이지만, 'wake'는 동사로 이 자리에 문법적으로 맞지 않으므로 지문과 일치하지 않습니다."},{"questionNumber":27,"type":"grammar","typeLabel":"문법","statement":"The blue light from the phone will also tells your brain not to sleep.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"이 문장은 문법(grammar) 유형의 오류를 포함하고 있습니다. 'will also tells'는 문법적으로 틀린 표현으로, 조동사 'will' 뒤에는 동사 원형이 와야 하므로 'will also tell'이 올바른 형태입니다. 지문에도 'will also tell'로 표기되어 있어, statement의 표현은 지문과 일치하지 않습니다."},{"questionNumber":28,"type":"grammar","typeLabel":"문법","statement":"If you use your smartphone late at night, your brain will stay actively.","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null,"explanation":"지문에서는 'your brain will stay active'라고 형용사 'active'를 사용하고 있습니다. 그러나 statement에서는 'actively'라는 부사를 사용하여 문법적으로 틀린 표현이 되었습니다. stay는 연결동사(linking verb)로 뒤에 형용사가 와야 하므로, 'actively'는 문법적으로 올바르지 않으며 지문과 일치하지 않습니다."},{"questionNumber":29,"type":"order","typeLabel":"순서 판단","statement":"카페인이 숨어 있는 음식과 음료에 대한 경고 → 운동을 마치는 시간에 대한 조언","answer":"O","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null},{"questionNumber":30,"type":"insertion","typeLabel":"문장 삽입","statement":"Move your body actively. → Stop using your smartphone before bedtime.","anchorSentence":"Move your body actively.","targetSentence":"Stop using your smartphone before bedtime.","claimedPosition":"after","answer":"X","passageId":2,"passageTitle":"Sleep Hygiene Tips","sourceSentence":null}]};

var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
</body>
</html>

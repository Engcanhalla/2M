<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}

.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}

.ox-btn.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444;color:#7f1d1d}

.ox-icon{display:block;font-size:1.6rem;margin-bottom:4px}
.fb{text-align:center;padding:14px 16px;border-radius:14px;margin-top:14px;font-weight:700;font-size:.92rem;line-height:1.5}

.nav-btn.next{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.set-list{display:grid;gap:10px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}

.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}

var CONFIG={"title":"M2L2diaOX","passThreshold":100,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Jacket Borrowing Request","body":"G1: Jina, is it okay if I wear your brown jacket?\nG2: My brown jacket? I put it in the washing machine this morning, and it’s not dry yet.\nG1: Oh, no! I wanted to wear that jacket.\nG2: Why don’t you wear your blue shirt? It’s warm today.\nG1: That’s a good idea. Thanks.\n"},{"id":2,"title":"Family Dinner Plans","body":"B: Mom, is it okay if I go to see a baseball game this evening?\nW: I’m afraid you can’t. We’re going to have dinner with Uncle John today.\nB: Oh, is it today? I didn’t know that.\nW: He’ll be here at six. How about going to the next game?\nB: Sure, I’ll check the time of the next game.\nW: Okay.\n"},{"id":3,"title":"London Trip Call","body":"W: Hello, Eric. How are you doing?\nB: I’m doing okay, thanks. How’s your trip to London, Grandma?\nW: It’s great. I went to Big Ben and had a meat pie yesterday.\nB: Wow! You’re having a great time there. By the way, what time is\nit in London now?\nW: lt’s a quarter past six in the morning.\nB: Oh, you woke up early! I hope you have a wonderful vacation\nthere.\n"},{"id":4,"title":"Birthday Cookie Baking","body":"Subin: Dad, is it okay if I use the oven to bake some cookies?\nDad: Sure, you can, Subin. What are they for?\nSubin: Today is Kate’s birthday, so I want to bake them for her.\nDad: That’s very nice of you. What time is it now?\nSubin: It’s a quarter past two.\nDad: I have an online meeting at 4, so I can help you now.\nSubin: That’s great!\nDad: What kind of cookies are you going to bake?\nSubin: Cheese cookies. Kate loves them.\nDad: Okay. Let’s start.\n"}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"G1은 G2의 파란색 재킷을 빌려 입고 싶어했다.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"G2는 갈색 재킷을 오늘 아침에 세탁기에 넣었다.","answer":"O","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"G2의 갈색 재킷은 아직 세탁기 안에 있다.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":4,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"G2는 날씨가 추우니 파란색 셔츠를 입으라고 제안했다.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":5,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"G1 asked if she could borrow G2's brown jacket.","answer":"O","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":6,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"G2 put her jacket in the dryer this morning.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":7,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"G2 suggested that G1 wear her blue jacket instead.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":8,"type":"grammar","typeLabel":"문법","statement":"I putted it in the washing machine this morning, and it's not dry yet.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null},{"questionNumber":9,"type":"grammar","typeLabel":"문법","statement":"Why aren't you wear your blue shirt? It's warm today.","answer":"X","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null,"explanation":"지문에서 G2의 말은 'Why don't you wear your blue shirt?'이지만, statement에서는 'Why aren't you wear your blue shirt?'로 표현되어 있습니다. 'Why don't you'와 'Why aren't you'는 다른 표현이므로 지문과 일치하지 않습니다. 따라서 한 단어 이상 다르게 기술되어 있어 X로 판정합니다."},{"questionNumber":10,"type":"grammar","typeLabel":"문법","statement":"Is it okay if I wear your brown jacket?","answer":"O","passageId":1,"passageTitle":"Jacket Borrowing Request","sourceSentence":null,"explanation":"지문의 첫 번째 줄에서 G1이 'is it okay if I wear your brown jacket?'라고 말하고 있으며, Statement와 완전히 일치합니다. 단어 선택, 순서, 의미 모두 동일하므로 O로 판정합니다."},{"questionNumber":11,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"소년은 오늘 저녁에 농구 경기를 보러 가도 되는지 물어봤다.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":12,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"소년의 가족은 오늘 John 삼촌과 저녁 식사를 할 예정이다.","answer":"O","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":13,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"소년은 John 삼촌이 오늘 온다는 것을 미리 알고 있었다.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":14,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"John 삼촌은 오후 7시에 도착할 예정이다.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":15,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy agreed to check the schedule of the next baseball game.","answer":"O","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":16,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The mother suggested that the boy go to the next basketball game instead.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null,"explanation":"지문에서 엄마는 'How about going to the next game?'이라고 말하며 다음 경기를 보러 가는 것을 제안했다. 그런데 statement는 'basketball game'이라고 했지만, 지문에서 소년이 보러 가고 싶었던 것은 'baseball game(야구 경기)'이다. 스포츠 종목이 다르므로 X로 판정한다."},{"questionNumber":17,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy was allowed to go to the baseball game because Uncle John was coming later.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":18,"type":"grammar","typeLabel":"문법","statement":"He will be here at six.","answer":"O","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":19,"type":"grammar","typeLabel":"문법","statement":"We are going to having dinner with Uncle John today.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null},{"questionNumber":20,"type":"grammar","typeLabel":"문법","statement":"I will checking the time of the next game.","answer":"X","passageId":2,"passageTitle":"Family Dinner Plans","sourceSentence":null,"explanation":"지문에서 소년은 'I'll check the time of the next game.'이라고 말했습니다. 'I'll'은 'I will'의 축약형으로, 조동사 will 뒤에는 동사원형이 와야 하므로 'check'가 올바른 형태입니다. Statement에서는 'will checking'이라는 문법적으로 잘못된 표현을 사용했으므로 X입니다."},{"questionNumber":21,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"에릭의 할머니는 런던 여행 중 빅벤을 방문했다.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"할머니는 런던에서 어제 피쉬 앤 칩스를 먹었다.","answer":"X","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"런던의 현재 시각은 오전 6시 15분이다.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":24,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"에릭은 할머니에게 즐거운 방학을 보내길 바란다고 말했다.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":25,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Eric's grandmother is currently traveling in Europe.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null,"explanation":"지문에서 할머니(Grandma)는 런던(London)에 여행 중이라고 언급되며, 빅벤을 방문하고 미트 파이를 먹었다고 말한다. 런던은 영국의 수도로 유럽에 위치해 있으므로, Eric의 할머니가 현재 유럽을 여행 중이라는 statement는 지문 내용과 일치한다."},{"questionNumber":26,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Eric asked his grandmother what the weather was like in London.","answer":"X","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":27,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The grandmother woke up early in the morning when she called Eric.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":28,"type":"grammar","typeLabel":"문법","statement":"I went to Big Ben and have a meat pie yesterday.","answer":"X","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null,"explanation":"지문에서 할머니는 'I went to Big Ben and had a meat pie yesterday.'라고 말했습니다. Statement에서는 'had' 대신 'have'를 사용했는데, 이는 과거시제를 현재시제로 바꾼 것이므로 지문과 일치하지 않습니다. 단 한 단어라도 다르면 X로 판정해야 하므로 답은 X입니다."},{"questionNumber":29,"type":"grammar","typeLabel":"문법","statement":"I hope you have a wonderful vacation there.","answer":"O","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null},{"questionNumber":30,"type":"grammar","typeLabel":"문법","statement":"It's six past a quarter in the morning.","answer":"X","passageId":3,"passageTitle":"London Trip Call","sourceSentence":null,"explanation":"지문에서 할머니는 런던의 현재 시간을 'It's a quarter past six in the morning.'이라고 말했습니다. 이는 '6시 15분'을 의미하는 올바른 영어 표현입니다. 그러나 statement는 'six past a quarter'로 단어 순서가 잘못되어 있으며, 이는 지문의 표현과 일치하지 않습니다."},{"questionNumber":31,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"수빈이는 Kate의 생일을 위해 쿠키를 굽고 싶어 한다.","answer":"O","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":32,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"수빈이가 아빠에게 도움을 요청했을 때 시각은 2시 30분이었다.","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":33,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"아빠는 오후 4시에 온라인 회의가 있어서 지금 수빈이를 도와줄 수 있다고 했다.","answer":"O","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":34,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"수빈이가 굽기로 한 쿠키의 종류는 초콜릿 쿠키이다.","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":35,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Subin's dad agrees to help her bake cookies before his online meeting starts.","answer":"O","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":36,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Subin wants to bake cookies because her dad asked her to make something for Kate.","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":37,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Kate dislikes cheese cookies, so Subin decided to bake a different kind.","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":38,"type":"grammar","typeLabel":"문법","statement":"Dad has an online meeting at 4, so he can helps Subin now","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null,"explanation":"지문의 내용은 'I have an online meeting at 4, so I can help you now'로, 4시에 온라인 회의가 있어서 지금 도와줄 수 있다는 내용과 일치합니다. 그러나 statement에서 'he can helps'는 문법적으로 틀린 표현(조동사 can 뒤에는 동사원형이 와야 하므로 'can help'가 맞음)으로, 문법 유형 문제에서 문법 오류가 포함된 statement는 지문과 일치하지 않는 것으로 판정합니다."},{"questionNumber":39,"type":"grammar","typeLabel":"문법","statement":"Subin wants to bake cheese cookies for Kate's birthday.","answer":"O","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null},{"questionNumber":40,"type":"grammar","typeLabel":"문법","statement":"It is a quarter past two when Subin ask her dad about using the oven.","answer":"X","passageId":4,"passageTitle":"Birthday Cookie Baking","sourceSentence":null}]};

var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
</body>
</html>

<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}

.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}

var CONFIG={"title":"M2_L1diaOX","passThreshold":100,"level":"low","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Badminton Goal","body":"G: Leo, do you have any special goals for this year?\nB: Yes, I'm planning to exercise more.\nG: Good for you! What kind of exercise do you want to do?\nB: I want to play badminton. Do you like badminton?\nG: Yes, I love it. Let's play together sometime.\nB: Sure!"},{"id":2,"title":"K-pop Concert","body":"B: Emma, what are you going to do this Saturday?\nG: Nothing special. Why?\nB: I'm planning to go to a K-pop concert. Do you want to join me?\nG: Wow, I'd love to! What time is the concert?\nB: It starts at 6 p.m.\nG: Okay. I can't wait."},{"id":3,"title":"Guitar Learning","body":"G: I'm learning to play the guitar these days. My friend Minji is teaching me.\nB: Who is Minji?\nG: She is the guitarist in the school band.\nB: Cool! Maybe you can perform in the future.\nG: Yes. Actually, I want to perform at the school festival.\nB: Sounds great. You can do it!"},{"id":4,"title":"Year Goals","body":"Jinsu: Nicole, what are your goals for this year?\nNicole: I'm planning to read 30 books. I tried last year but didn't make it.\nJinsu: That's a big goal.\nNicole: Yes, I really want to do it this time.\nJinsu: You can do it! Just read a little every day.\nNicole: Okay, I will. What are your goals, Jinsu?\nJinsu: I'm planning to run for the election. I want to become class president.\nNicole: You're good at listening to people. You'll be a great leader.\nJinsu: Thank you for saying so.\nNicole: You're welcome. I hope we can reach our goals."}],"questions":[{"questionNumber":1,"passageId":1,"passageTitle":"Badminton Goal","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Leo의 올해 목표는 더 많이 공부하는 것이다.","sourceSentence":"Yes, I'm planning to exercise more.","answer":"X","explanation":"원문에서 Leo는 'exercise more(더 많이 운동하는 것)'을 목표로 밝혔다. '공부(study)'는 대화에 전혀 등장하지 않으므로 틀린 진술이다."},{"questionNumber":2,"passageId":1,"passageTitle":"Badminton Goal","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Leo가 하고 싶은 운동은 테니스이다.","sourceSentence":"I want to play badminton.","answer":"X","explanation":"원문에서 Leo가 하고 싶다고 한 운동은 '배드민턴(badminton)'이다. '테니스(tennis)'로 교체하여 만든 틀린 진술이다."},{"questionNumber":3,"passageId":1,"passageTitle":"Badminton Goal","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Leo가 여학생에게 배드민턴을 같이 하자고 먼저 제안했다.","sourceSentence":"Yes, I love it. Let's play together sometime.","answer":"X","explanation":"'Let's play together sometime'이라고 먼저 제안한 것은 여학생(G)이다. Leo는 'Sure!'라고 동의했을 뿐이므로 제안자를 바꾸어 만든 틀린 진술이다."},{"questionNumber":4,"passageId":1,"passageTitle":"Badminton Goal","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여학생은 배드민턴을 좋아한다고 말했다.","sourceSentence":"Yes, I love it.","answer":"O","explanation":"여학생은 'Yes, I love it.'이라고 말하며 배드민턴을 좋아한다고 직접 표현했다. 올바른 진술이다."},{"questionNumber":5,"passageId":1,"passageTitle":"Badminton Goal","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Leo is planning to exercise more and wants to play badminton alone.","sourceSentence":"Let's play together sometime.","answer":"X","explanation":"앞부분 'Leo is planning to exercise more'는 원문과 일치하지만, 'alone(혼자)'이라는 부분이 틀렸다. Leo는 여학생의 'Let's play together' 제안에 'Sure!'라고 동의하여 함께(together) 하기로 했다."},{"questionNumber":6,"passageId":1,"passageTitle":"Badminton Goal","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The girl loves badminton and agreed to play with Leo sometime.","sourceSentence":"Yes, I love it. Let's play together sometime.","answer":"O","explanation":"여학생은 'Yes, I love it.'으로 배드민턴을 좋아한다고 했고, 'Let's play together sometime'으로 Leo와 함께 하자고 제안했다. 대화 내용을 올바르게 요약한 진술이다."},{"questionNumber":7,"passageId":1,"passageTitle":"Badminton Goal","type":"insertion","typeLabel":"순서 맞추기","statement":"Yes, I'm planning to exercise more. → Yes, I love it. Let's play together sometime.","sourceSentence":null,"answer":"X","explanation":"'Yes, I'm planning to exercise more.' 바로 다음에 오는 문장은 여학생의 'Good for you! What kind of exercise do you want to do?'이다. 'Yes, I love it. Let's play together sometime.'은 두 차례 교환 이후에 나오므로 직접 이어지지 않는다."},{"questionNumber":8,"passageId":2,"passageTitle":"K-pop Concert","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남학생은 이번 일요일에 K-팝 콘서트에 갈 계획이다.","sourceSentence":"Emma, what are you going to do this Saturday?","answer":"X","explanation":"원문에서 콘서트가 있는 날은 'this Saturday(이번 토요일)'이다. '일요일(Sunday)'로 바꾸어 만든 틀린 진술이다."},{"questionNumber":9,"passageId":2,"passageTitle":"K-pop Concert","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"콘서트는 오후 7시에 시작한다.","sourceSentence":"It starts at 6 p.m.","answer":"X","explanation":"원문에서 콘서트 시작 시간은 '6 p.m.(오후 6시)'이다. '오후 7시'로 숫자를 바꾸어 만든 틀린 진술이다."},{"questionNumber":10,"passageId":2,"passageTitle":"K-pop Concert","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Emma가 남학생에게 K-팝 콘서트에 함께 가자고 먼저 제안했다.","sourceSentence":"I'm planning to go to a K-pop concert. Do you want to join me?","answer":"X","explanation":"콘서트에 함께 가자고 먼저 제안한 것은 남학생(B)이다. 'Do you want to join me?'라고 물은 것이 남학생이며, Emma가 수락했다. 제안자를 바꾼 틀린 진술이다."},{"questionNumber":11,"passageId":2,"passageTitle":"K-pop Concert","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Emma는 콘서트에 함께 가고 싶다고 했다.","sourceSentence":"Wow, I'd love to!","answer":"O","explanation":"Emma는 'Wow, I'd love to!'라고 말하며 함께 가고 싶다는 의사를 분명히 밝혔다. 올바른 진술이다."},{"questionNumber":12,"passageId":2,"passageTitle":"K-pop Concert","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy invited Emma to a K-pop concert, but Emma said she was not interested.","sourceSentence":"Wow, I'd love to! What time is the concert?","answer":"X","explanation":"Emma는 'Wow, I'd love to!'라고 말하며 매우 기쁘게 수락했다. 'not interested(관심 없다)'는 실제 반응과 정반대이므로 틀린 진술이다."},{"questionNumber":13,"passageId":2,"passageTitle":"K-pop Concert","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy invited Emma to a K-pop concert starting at 6 p.m. this Saturday.","sourceSentence":"It starts at 6 p.m.","answer":"O","explanation":"남학생은 이번 토요일 오후 6시에 시작하는 K-팝 콘서트에 Emma를 초대했고, Emma는 기꺼이 수락했다. 대화의 핵심 정보를 모두 올바르게 담은 진술이다."},{"questionNumber":14,"passageId":2,"passageTitle":"K-pop Concert","type":"insertion","typeLabel":"순서 맞추기","statement":"I'm planning to go to a K-pop concert. Do you want to join me? → Okay. I can't wait.","sourceSentence":null,"answer":"X","explanation":"'Do you want to join me?' 바로 다음에 오는 문장은 Emma의 'Wow, I'd love to! What time is the concert?'이다. 'Okay. I can't wait.'는 콘서트 시간을 확인한 뒤에 나오므로 직접 이어지지 않는다."},{"questionNumber":15,"passageId":3,"passageTitle":"Guitar Learning","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Minji는 학교 밴드의 드러머이다.","sourceSentence":"She is the guitarist in the school band.","answer":"X","explanation":"원문에서 Minji는 학교 밴드의 '기타리스트(guitarist)'이다. '드러머(drummer)'로 악기를 바꾸어 만든 틀린 진술이다."},{"questionNumber":16,"passageId":3,"passageTitle":"Guitar Learning","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남학생이 여학생에게 기타를 가르쳐 주고 있다.","sourceSentence":"My friend Minji is teaching me.","answer":"X","explanation":"여학생에게 기타를 가르쳐 주고 있는 사람은 남학생이 아니라 여학생의 친구 'Minji'이다. 가르치는 사람을 바꾸어 만든 틀린 진술이다."},{"questionNumber":17,"passageId":3,"passageTitle":"Guitar Learning","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여학생은 요즘 기타를 배우고 있으며, 앞으로 학교 밴드에 들어가고 싶다고 했다.","sourceSentence":"Yes. Actually, I want to perform at the school festival.","answer":"X","explanation":"앞부분 '기타를 배우고 있다'는 맞지만, 여학생의 목표는 '학교 밴드 가입'이 아니라 '학교 축제에서 공연하는 것(perform at the school festival)'이다. 목표를 바꾸어 만든 틀린 진술이다."},{"questionNumber":18,"passageId":3,"passageTitle":"Guitar Learning","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여학생은 학교 축제에서 공연하고 싶다고 했다.","sourceSentence":"Yes. Actually, I want to perform at the school festival.","answer":"O","explanation":"'I want to perform at the school festival.'이라고 직접 말했으므로 올바른 진술이다. 기타를 배우는 목표와도 일치한다."},{"questionNumber":19,"passageId":3,"passageTitle":"Guitar Learning","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Minji가 학교 축제에서 공연하고 싶어 한다.","sourceSentence":"Yes. Actually, I want to perform at the school festival.","answer":"X","explanation":"학교 축제에서 공연하고 싶다고 말한 것은 Minji가 아니라 기타를 배우는 여학생(G)이다. 등장인물을 바꾸어 만든 틀린 진술이다."},{"questionNumber":20,"passageId":3,"passageTitle":"Guitar Learning","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The girl is learning piano from her friend Minji, who plays in the school band.","sourceSentence":"I'm learning to play the guitar these days. My friend Minji is teaching me.","answer":"X","explanation":"여학생이 배우고 있는 악기는 '피아노(piano)'가 아니라 '기타(guitar)'이다. 악기 이름을 바꾸어 만든 틀린 진술이다."},{"questionNumber":21,"passageId":3,"passageTitle":"Guitar Learning","type":"insertion","typeLabel":"순서 맞추기","statement":"Yes. Actually, I want to perform at the school festival. → Sounds great. You can do it!","sourceSentence":null,"answer":"O","explanation":"'I want to perform at the school festival.' 바로 다음에 남학생이 'Sounds great. You can do it!'이라고 격려하는 문장이 이어진다. 제시된 순서가 지문의 실제 순서와 정확히 일치한다."},{"questionNumber":22,"passageId":4,"passageTitle":"Year Goals","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole의 목표는 올해 책을 20권 읽는 것이다.","sourceSentence":"I'm planning to read 30 books.","answer":"X","explanation":"원문에서 Nicole의 목표는 '30권(30 books)'이다. '20권'으로 숫자를 바꾸어 만든 틀린 진술이다."},{"questionNumber":23,"passageId":4,"passageTitle":"Year Goals","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole은 작년에도 책 30권 읽기를 시도했고 성공했다.","sourceSentence":"I tried last year but didn't make it.","answer":"X","explanation":"앞부분 '작년에도 시도했다'는 원문과 일치하지만, Nicole은 'didn't make it(달성하지 못했다)'이라고 했다. 뒷부분 '성공했다'는 원문과 반대이므로 틀린 진술이다."},{"questionNumber":24,"passageId":4,"passageTitle":"Year Goals","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole이 Jinsu에게 매일 조금씩 읽으라고 조언했다.","sourceSentence":"You can do it! Just read a little every day.","answer":"X","explanation":"'Just read a little every day'라고 조언한 것은 Nicole이 아니라 Jinsu이다. 조언한 사람을 바꾸어 만든 틀린 진술이다."},{"questionNumber":25,"passageId":4,"passageTitle":"Year Goals","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Jinsu의 목표는 반장 선거에 출마하는 것이다.","sourceSentence":"I'm planning to run for the election. I want to become class president.","answer":"O","explanation":"Jinsu는 'I'm planning to run for the election. I want to become class president.'라고 직접 밝혔다. 올바른 진술이다."},{"questionNumber":26,"passageId":4,"passageTitle":"Year Goals","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole은 Jinsu가 말을 잘 하기 때문에 훌륭한 리더가 될 것이라고 했다.","sourceSentence":"You're good at listening to people. You'll be a great leader.","answer":"X","explanation":"Nicole이 Jinsu를 칭찬한 이유는 'listening to people(사람들의 말을 잘 듣는 것)'이다. '말을 잘 한다'는 원문에 없는 내용으로, 한 단어 차이로 의미가 달라진 틀린 진술이다."},{"questionNumber":27,"passageId":4,"passageTitle":"Year Goals","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Nicole wants to read 30 books this year, and Jinsu plans to run for class president.","sourceSentence":"I'm planning to read 30 books.","answer":"O","explanation":"Nicole의 목표(책 30권 읽기)와 Jinsu의 목표(반장 선거 출마)를 모두 정확하게 요약한 진술이다. 대화의 핵심 내용과 일치한다."},{"questionNumber":28,"passageId":4,"passageTitle":"Year Goals","type":"insertion","typeLabel":"순서 맞추기","statement":"I'm planning to run for the election. I want to become class president. → You're welcome. I hope we can reach our goals.","sourceSentence":null,"answer":"X","explanation":"'I want to become class president.' 바로 다음에 오는 문장은 Nicole의 'You're good at listening to people. You'll be a great leader.'이다. 'You're welcome. I hope we can reach our goals.'는 'Thank you for saying so.'에 대한 답으로 두 교환 이후에 나온다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  if(q.sourceSentence){sourceHTML="<div class='source-box'><span class='source-label'>원문</span>"+esc(q.sourceSentence)+"</div>";}
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>

<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#2e1065 0%,#4c1d95 60%,#1e1b4b 100%);min-height:100vh;min-height:-webkit-fill-available;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(80px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;touch-action:pan-y}
.wrap{max-width:520px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}
.header{background:linear-gradient(150deg,#2e1065 0%,#4c1d95 60%,#1e1b4b 100%);padding:24px 20px 18px;color:#fff;text-align:center;position:-webkit-sticky;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.header h1{font-size:1.15rem;font-weight:700;margin-bottom:3px;letter-spacing:-.02em}
.header p{opacity:.7;font-size:.8rem}
.content{padding:20px 18px 40px}
.prog-bar{height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);border-radius:4px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:6px;font-weight:500}
.title-box{text-align:center;margin:10px 0 14px;padding:18px 16px;background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-radius:18px;border:2px solid #c4b5fd}
.title-box .ptitle{font-size:1.55rem;font-weight:800;color:#5b21b6;letter-spacing:-.02em;line-height:1.2}
.title-box .tlabel{display:inline-block;margin-top:6px;font-size:.72rem;background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:20px;font-weight:700}
.statement{margin:14px 0;padding:16px 18px;background:#fff;border:1.5px solid #e8ecf1;border-radius:14px;font-size:1rem;color:#1e293b;line-height:1.65;font-weight:500;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.source-box{margin:10px 0 4px;padding:12px 14px;background:#f9fafb;border-left:3px solid #a78bfa;border-radius:0 10px 10px 0;font-size:.82rem;color:#4b5563;line-height:1.65;font-style:italic}
.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}
.ox-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.ox-btn{padding:18px 10px;border:2px solid #e5e7eb;background:#fff;border-radius:16px;font-size:1rem;font-weight:800;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;min-height:84px}
.ox-btn:active{transform:scale(.96)}
.ox-btn.o{color:#059669}
.ox-btn.x{color:#dc2626}
.ox-btn.dunno{grid-column:1 / span 2;padding:14px;font-size:.92rem;color:#64748b;font-weight:700;min-height:0}
.ox-btn.sel.o{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981}
.ox-btn.sel.x{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444}
.ox-btn.sel.dunno{background:#f1f5f9;border-color:#94a3b8}
.ox-btn.correct{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981;color:#065f46}
.ox-btn.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444;color:#7f1d1d}
.ox-btn[disabled]{cursor:default;opacity:.85}
.ox-icon{display:block;font-size:1.6rem;margin-bottom:4px}
.fb{text-align:center;padding:14px 16px;border-radius:14px;margin-top:14px;font-weight:700;font-size:.92rem;line-height:1.5}
.fb.ok{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7}
.fb.ng{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;border:1.5px solid #fda4af}
.fb.dunno{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.explain-box{margin-top:10px;padding:14px;background:#fff;border-radius:12px;border:1.5px solid #e8ecf1}
.ex-title{font-size:.82rem;font-weight:800;color:#6d28d9;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #f1f5f9}
.ex-body{font-size:.88rem;color:#374151;line-height:1.75}
.ex-answer{display:inline-block;font-size:.95rem;font-weight:900;padding:2px 14px;border-radius:20px;margin-right:8px;vertical-align:middle}
.ex-answer.O{background:#dcfce7;color:#166534}
.ex-answer.X{background:#fee2e2;color:#991b1b}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1.5px solid #e8ecf1;gap:8px}
.nav-btn{padding:10px 16px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation}
.nav-btn.prev,.nav-btn.home{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.set-list{display:grid;gap:10px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.set-card:hover{border-color:#8b5cf6;background:#faf5ff;transform:translateY(-2px)}
.set-card.done{border-color:#8b5cf6;background:linear-gradient(135deg,#faf5ff,#f3e8ff)}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}
@media(prefers-reduced-motion:reduce){.fade{animation:none}}</style>

var CONFIG={"title":"M2L1diaOX","passThreshold":100,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Badminton Exercise Goals","body":"G: Leo, do you have any special goals for this year?\nB: Yes, I’m planning to exercise more.\nG: Good for you! What kind of exercise do you want to do?\nB: I want to play badminton. Do you like badminton?\nG: Yes, I love it. Let’s play together sometime.\nB: Sure!\n"},{"id":2,"title":"K-pop Concert Plan","body":"B: Emma, what are you going to do this Saturday?\nG: Nothing special. Why?\nB: I’m planning to go to a K-pop concert. Do you want to join me?\nG: Wow, I’d love to! What time is the concert?\nB: It starts at 6 p.m.\nG: Okay. I can’t wait.\n"},{"id":3,"title":"Guitar Learning Conversation","body":"G: I’m learning to play the guitar these days. My friend Minji is\nteaching me.\nB: Who is Minji?\nG: She is the guitarist in the school band.\nB: Cool! Maybe you can perform in the future.\nG: Yes. Actually, I want to perform at the school festival.\nB: Sounds great. You can do it!\n"},{"id":4,"title":"Annual Goals Conversation","body":"Jinsu: Nicole, what are your goals for this year?\nNicole: I’m planning to read 30 books. I tried last year but didn’t make it.\nJinsu: That’s a big goal.\nNicole: Yes, I really want to do it this time.\nJinsu: You can do it! Just read a little every day.\nNicole: Okay, I will. What are your goals, Jinsu?\nJinsu: I’m planning to run for the election. I want to become class\npresident.\nNicole: You’re good at listening to people. You’ll be a great leader.\nJinsu: Thank you for saying so.\nNicole: You’re welcome. I hope we can reach our goals.\n"}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Leo는 올해 특별한 목표로 더 많이 운동하고 싶다고 말했다.","answer":"O","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Leo가 하고 싶은 운동은 테니스이다.","answer":"X","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여자아이는 테니스를 좋아한다고 말했다.","answer":"X","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null,"explanation":"지문에서 여자아이는 배드민턴을 좋아한다고 말했다('Yes, I love it'). 테니스를 좋아한다는 언급은 전혀 없으므로 statement는 지문 내용과 일치하지 않는다."},{"questionNumber":4,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여자아이는 Leo에게 언젠가 함께 배드민턴을 치자고 제안했다.","answer":"O","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":5,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남자아이가 먼저 여자아이에게 배드민턴을 좋아하는지 물어보았다.","answer":"O","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":6,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Leo is planning to eat more healthy food as his goal for this year.","answer":"X","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":7,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The girl said she loves badminton when Leo asked her about it.","answer":"O","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":8,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Leo suggested playing badminton together after the girl said she liked it.","answer":"X","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":9,"type":"insertion","typeLabel":"문장 삽입 위치","statement":"\"Do you like badminton?\" → \"Yes, I love it.\"","anchorSentence":"Do you like badminton?","targetSentence":"Yes, I love it.","claimedPosition":"after","answer":"O","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":10,"type":"order","typeLabel":"문장 순서","statement":"\"Let's play together sometime.\" → \"I want to play badminton.\"","answer":"X","passageId":1,"passageTitle":"Badminton Exercise Goals","sourceSentence":null},{"questionNumber":11,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남자는 이번 토요일에 K-pop 콘서트에 갈 계획이라고 말했다.","answer":"O","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":12,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여자는 이번 금요일에 특별한 계획이 없다고 답했다.","answer":"X","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null,"explanation":"지문에서 남자는 '이번 토요일(this Saturday)'에 무엇을 할 것인지 물었고, 여자는 특별한 계획이 없다고 답했다. Statement에서는 '금요일'이라고 언급했으나 실제 대화의 요일은 '토요일'이므로 내용이 일치하지 않는다."},{"questionNumber":13,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"콘서트는 오후 6시에 시작한다.","answer":"O","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":14,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남자는 여자에게 콘서트에 함께 가자고 제안했다.","answer":"O","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":15,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"콘서트는 오전 6시에 시작할 예정이다.","answer":"X","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":16,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy invited Emma to join him at a K-pop festival.","answer":"X","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":17,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The boy agreed to go to the K-pop concert with Emma.","answer":"X","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null,"explanation":"지문에서 K-pop 콘서트에 가자고 제안한 것은 소년(Boy)이고, Emma(여자아이)가 그 제안에 동의한 것이다. statement는 소년이 Emma와 함께 가기로 동의했다고 서술하고 있어 주체와 역할이 뒤바뀌어 있으므로 틀렸다."},{"questionNumber":18,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Emma said she has nothing to do this Saturday.","answer":"O","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null,"explanation":"지문에서 Emma(G)는 이번 토요일에 대해 'Nothing special(특별한 것 없어)'이라고 답했습니다. 이는 특별히 할 일이 없다는 의미로, statement의 'nothing to do this Saturday'와 일치합니다. 따라서 판정은 O입니다."},{"questionNumber":19,"type":"insertion","typeLabel":"문장 삽입 위치 판단","statement":"\"It starts at 6 p.m.\" → \"Okay. I can't wait.\"","anchorSentence":"It starts at 6 p.m.","targetSentence":"Okay. I can't wait.","claimedPosition":"after","answer":"O","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":20,"type":"order","typeLabel":"두 문장 순서","statement":"\"I'd love to! What time is the concert?\" → \"I'm planning to go to a K-pop concert. Do you want to join me?\"","answer":"X","passageId":2,"passageTitle":"K-pop Concert Plan","sourceSentence":null},{"questionNumber":21,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여자아이는 요즘 기타 조립을 배우고 있다.","answer":"X","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null,"explanation":"지문에서 여자아이는 요즘 '기타 치는 법(play the guitar)'을 배우고 있다고 말했다. Statement는 '기타 조립'을 배우고 있다고 했으나, 이는 지문의 내용과 다르다."},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"민지는 여자아이에게 기타를 가르쳐 주고 있다.","answer":"O","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"민지는 학교 밴드에서 전자기타를 담당하고 있다.","answer":"X","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null,"explanation":"지문에서 민지는 'the guitarist in the school band(학교 밴드의 기타리스트)'라고만 언급되어 있습니다. 민지가 전자기타를 담당한다는 내용은 지문 어디에도 나오지 않으며, 어떤 종류의 기타를 연주하는지에 대한 정보는 전혀 제공되지 않습니다. 따라서 '전자기타'라는 구체적인 표현은 지문에 없는 내용으로 X입니다."},{"questionNumber":24,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"여자아이는 학교 축제에서 공연하고 싶어 한다.","answer":"O","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":25,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"남자아이는 여자아이의 공연 계획에 부정적인 반응을 보였다.","answer":"X","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":26,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The girl is being taught guitar by her friend Minji.","answer":"O","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":27,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Minji plays the guitar in the city band.","answer":"X","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":28,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The girl hopes to perform at the school festival someday.","answer":"O","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":29,"type":"insertion","typeLabel":"문장 삽입","statement":"\"Cool! Maybe you can perform in the future.\" → \"She is the guitarist in the school band.\"","anchorSentence":"Cool! Maybe you can perform in the future.","targetSentence":"She is the guitarist in the school band.","claimedPosition":"after","answer":"X","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":30,"type":"order","typeLabel":"문장 순서","statement":"The boy asks who Minji is. → The girl says she wants to perform at the school festival.","answer":"O","passageId":3,"passageTitle":"Guitar Learning Conversation","sourceSentence":null},{"questionNumber":31,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole은 올해 책을 30권 사겠다는 목표를 세웠다.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null,"explanation":"Nicole의 목표는 올해 책을 30권 '사겠다'는 것이 아니라 '읽겠다(read 30 books)'는 것이다. 지문에서 Nicole은 'I'm planning to read 30 books'라고 명확히 말하고 있으므로, '사겠다'는 표현은 지문 내용과 다르다."},{"questionNumber":32,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole은 작년에 독서 목표를 달성하지 못했다.","answer":"O","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":33,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Jinsu는 Nicole에게 하루에 많은 시간을 투자해서 책을 읽으라고 조언했다.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":34,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Jinsu의 올해 목표는 학급 회장 선거를 위해 운동장을 뛰는 것이다.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null,"explanation":"지문에서 Jinsu의 올해 목표는 'run for the election'(선거에 출마하다)이며, 학급 회장(class president)이 되고자 한다고 밝혔다. 그러나 statement는 'run for the election'을 '운동장을 뛰는 것'으로 잘못 해석하여 의미를 왜곡하였다. 'run for ~'는 '~에 출마하다'라는 뜻으로, 달리기와는 전혀 관련이 없다."},{"questionNumber":35,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Nicole은 Jinsu가 사람들의 말을 잘 들어주기 때문에 훌륭한 리코더가 될 것이라고 말했다.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null,"explanation":"Nicole은 Jinsu가 사람들의 말을 잘 들어준다고 하며 훌륭한 '리더(leader)'가 될 것이라고 말했다. 그러나 statement에서는 '리코더'가 될 것이라고 잘못 기술하고 있으므로 지문 내용과 일치하지 않는다."},{"questionNumber":36,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Nicole attempted to reach her reading goal the previous year but failed to achieve it.","answer":"O","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":37,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Jinsu encouraged Nicole by telling her to read a lot of books at once.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":38,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Nicole complimented Jinsu on his ability to speak well in front of others.","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":39,"type":"insertion","typeLabel":"문장 삽입","statement":"\"You can do it! Just read a little every day.\" → \"Okay, I will. What are your goals, Jinsu?\"","anchorSentence":"You can do it! Just read a little every day.","targetSentence":"Okay, I will. What are your goals, Jinsu?","claimedPosition":"before","answer":"O","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null},{"questionNumber":40,"type":"order","typeLabel":"문장 순서","statement":"Nicole이 Jinsu에게 목표를 묻는다 → Jinsu가 선거 출마 계획을 밝힌다","answer":"X","passageId":4,"passageTitle":"Annual Goals Conversation","sourceSentence":null}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
